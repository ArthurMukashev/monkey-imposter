upload_max_filesize = 100M
post_max_size = 100M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
date.timezone = UTC

; Расширения
extension=mbstring
extension=exif
extension=gd
extension=pdo_pgsql
extension=pgsql
extension=intl
extension=opcache
extension=zip
extension=redis

; Опкэш
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
opcache.revalidate_freq=60

; Xdebug для разработки (закомментировано, раскомментить при необходимости)
; zend_extension=xdebug
; xdebug.mode=debug
; xdebug.client_host=host.docker.internal
; xdebug.idekey=PHPSTORM
